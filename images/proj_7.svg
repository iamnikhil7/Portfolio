<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Harold and Crew – Design Studio School project">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#111418"/>
      <stop offset="0.55" stop-color="#1a1f26"/>
      <stop offset="1"   stop-color="#0b0d10"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.18" cy="0.25" r="0.7">
      <stop offset="0" stop-color="#ffbd39" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffbd39" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.82" cy="0.8" r="0.7">
      <stop offset="0" stop-color="#5aa9ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5aa9ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffda85"/>
      <stop offset="1" stop-color="#ffbd39"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="520" fill="url(#bg)"/>
  <rect width="800" height="520" fill="url(#grid)"/>
  <rect width="800" height="520" fill="url(#glow1)"/>
  <rect width="800" height="520" fill="url(#glow2)"/>

  <g opacity="0.85">
    <circle cx="110" cy="120" r="3" fill="#ffbd39"/>
    <circle cx="690" cy="380" r="3" fill="#5aa9ff"/>
    <circle cx="620" cy="90"  r="2" fill="#ffffff" opacity="0.5"/>
    <circle cx="160" cy="430" r="2" fill="#ffffff" opacity="0.4"/>
  </g>

  <g transform="translate(60 70)">
    <rect x="0" y="0" width="42" height="22" rx="11" fill="#ffbd39" fill-opacity="0.12" stroke="#ffbd39" stroke-opacity="0.35"/>
    <text x="21" y="15" text-anchor="middle" font-family="Poppins, Inter, system-ui, sans-serif"
          font-size="10" font-weight="700" letter-spacing="2" fill="#ffbd39">PROJECT</text>
  </g>

  <text x="60" y="190" font-family="Poppins, Inter, system-ui, sans-serif"
        font-size="72" font-weight="800" fill="url(#amber)" letter-spacing="-1">Harold</text>
  <text x="60" y="270" font-family="Poppins, Inter, system-ui, sans-serif"
        font-size="72" font-weight="300" fill="#ffffff" letter-spacing="-0.5">&amp; Crew</text>

  <line x1="60" y1="310" x2="180" y2="310" stroke="#ffbd39" stroke-width="2" stroke-linecap="round"/>

  <text x="60" y="348" font-family="Poppins, Inter, system-ui, sans-serif"
        font-size="15" font-weight="600" fill="#ffffff" opacity="0.92" letter-spacing="1">Design Studio School</text>
  <text x="60" y="374" font-family="Poppins, Inter, system-ui, sans-serif"
        font-size="12" font-weight="400" fill="#ffffff" opacity="0.55" letter-spacing="0.5">UI / UX &#183; Product Design &#183; Build</text>

  <g transform="translate(520 180)" opacity="0.9">
    <circle cx="80" cy="80" r="96" fill="none" stroke="#ffbd39" stroke-opacity="0.28" stroke-dasharray="4 6"/>
    <circle cx="80" cy="80" r="70" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="80" cy="80" r="40" fill="#ffbd39" fill-opacity="0.10" stroke="#ffbd39" stroke-opacity="0.45"/>
    <text x="80" y="86" text-anchor="middle" font-family="Poppins, Inter, system-ui, sans-serif"
          font-size="22" font-weight="800" fill="#ffbd39">H&amp;C</text>
  </g>

  <g transform="translate(60 460)" opacity="0.7">
    <circle cx="5" cy="0" r="3" fill="#ffbd39"/>
    <text x="18" y="4" font-family="Poppins, Inter, system-ui, sans-serif"
          font-size="11" font-weight="500" fill="#ffffff" letter-spacing="2">LIVE &#183; studio-school.com</text>
  </g>
</svg>
